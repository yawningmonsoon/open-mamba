name: Secret scan

# Hard-fail any push or PR that introduces a credential. Catches:
# - Anthropic API keys (sk-ant-api03-…), OAuth access/refresh tokens
# - GitHub PATs (ghp_…, gho_…), fine-grained tokens
# - AWS keys, GCP service-account JSON, Stripe live keys, etc.
#
# Runs on every push + PR. No secrets required to run gitleaks.

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so PRs scan new commits, not just diff

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN is the default action token, scoped to this repo only —
          # not a privilege escalation. Required by gitleaks-action to comment
          # on PRs when leaks are found.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
