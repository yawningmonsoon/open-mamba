name: Secret scan

# Hard-fail any push or PR that introduces a credential. Catches:
# - Anthropic API keys (sk-ant-api03-…), OAuth access/refresh tokens
# - GitHub PATs (ghp_…, gho_…), fine-grained tokens
# - AWS keys, GCP service-account JSON, Stripe live keys, etc.
#
# Runs on every push + PR. No secrets required to run gitleaks.

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so PRs scan new commits, not just diff

      # We invoke gitleaks directly rather than using gitleaks-action because
      # the action passes `--log-opts=--first-parent <baseSHA>^..<headSHA>`
      # which fails on root commits (their parent doesn't exist) and on
      # initial pushes with truncated history. Direct invocation scans the
      # whole tracked tree and current HEAD, which is what we want anyway.
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan working tree
        run: gitleaks detect --no-git --redact -v --config .gitleaks.toml

      - name: Scan git history
        run: gitleaks detect --redact -v --config .gitleaks.toml --log-opts="--all"
