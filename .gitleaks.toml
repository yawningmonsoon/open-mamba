# gitleaks ruleset for open-mamba.
#
# Inherits the default gitleaks rules (covers AWS, GitHub, Slack, Stripe,
# generic high-entropy strings, etc.) and adds Anthropic-specific patterns
# that aren't yet upstream.

[extend]
useDefault = true

[[rules]]
id          = "anthropic-api-key"
description = "Anthropic API key"
regex       = '''sk-ant-api[0-9]{2}-[A-Za-z0-9_\-]{32,}'''
tags        = ["key", "anthropic"]

[[rules]]
id          = "anthropic-oauth-access"
description = "Anthropic OAuth access token (Claude Code)"
regex       = '''sk-ant-oat[0-9]{2}-[A-Za-z0-9_\-]{32,}'''
tags        = ["key", "anthropic", "oauth"]

[[rules]]
id          = "anthropic-oauth-refresh"
description = "Anthropic OAuth refresh token"
regex       = '''sk-ant-ort[0-9]{2}-[A-Za-z0-9_\-]{32,}'''
tags        = ["key", "anthropic", "oauth"]

# Allowlist: explicit placeholder values that look key-shaped but aren't real.
[allowlist]
description = "Documented placeholders / test fixtures / public OAuth IDs"
paths = [
    '''.env\.example''',
    '''README\.md''',
    '''.*/test.*\.rs''',
]
regexes = [
    # All-zero MAMBA_ENCRYPT_KEY placeholder
    '''0{32,64}''',
    # Anthropic Claude.ai public OAuth client ID. Same value used in
    # openclaw, pi-ai, and other open-source Claude Code integrations.
    # Public per design — required for the OAuth authorization-code flow.
    '''9d1c250a-e61b-44d9-88ed-5944d1962f5e''',
]
